<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Lost & Found</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container navbar-container">
            <a href="index.html" class="navbar-brand">Lost<span>&</span>Found</a>
        </div>
    </nav>

    <main class="main-content">
        <div class="glass-card">
            <h2>Create an Account</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label for="registerName" class="form-label">Full Name</label>
                    <input type="text" id="registerName" class="form-input" required placeholder="John Doe" autocomplete="name">
                </div>
                <div class="form-group">
                    <label for="registerEmail" class="form-label">Email Address</label>
                    <input type="email" id="registerEmail" class="form-input" required placeholder="you@example.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="registerPassword" class="form-label">Password</label>
                    <input type="password" id="registerPassword" class="form-input" required placeholder="Min 6 characters" minlength="6" autocomplete="new-password">
                </div>
                
                <div id="registerError" class="error-message hidden"></div>
                
                <button type="submit" class="btn btn-primary mt-4" id="registerSubmitBtn">Create Account</button>
                
                <div class="text-center mt-4">
                    <p>Already have an account? <a href="login.html" class="auth-link">Sign in here</a></p>
                </div>
            </form>
        </div>
    </main>

    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
