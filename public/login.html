<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Lost & Found</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container navbar-container">
            <a href="index.html" class="navbar-brand">Lost<span>&</span>Found</a>
        </div>
    </nav>

    <main class="main-content">
        <div class="glass-card">
            <h2>Welcome Back</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginEmail" class="form-label">Email Address</label>
                    <input type="email" id="loginEmail" class="form-input" required placeholder="you@example.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="loginPassword" class="form-label">Password</label>
                    <input type="password" id="loginPassword" class="form-input" required placeholder="••••••••" autocomplete="current-password">
                </div>
                
                <div id="loginError" class="error-message hidden"></div>
                
                <button type="submit" class="btn btn-primary mt-4" id="loginSubmitBtn">Sign In</button>
                
                <div class="text-center mt-4">
                    <p>Don't have an account? <a href="register.html" class="auth-link">Register here</a></p>
                </div>
            </form>
        </div>
    </main>

    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
